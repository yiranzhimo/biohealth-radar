name: Refresh BioHealth Radar Data

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      review_limit:
        description: "Maximum new signals to review with OpenAI"
        required: false
        default: "10"
      apply_needs_review:
        description: "Allow OpenAI high-confidence low-risk passes to clear needsReview"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "refresh-data"
  cancel-in-progress: false

jobs:
  refresh:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_REVIEW_MODEL: ${{ vars.OPENAI_REVIEW_MODEL || 'gpt-5.6-luna' }}
      REVIEW_LIMIT: ${{ github.event.inputs.review_limit || '10' }}
      APPLY_NEEDS_REVIEW: ${{ github.event.inputs.apply_needs_review || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Preserve previous data snapshot
        run: |
          cp data.js /tmp/biohealth-radar-data-previous.js

      - name: Collect PubMed
        run: |
          python3 scripts/collect_pubmed.py --days 365 --retmax 6 --max-total 24

      - name: Collect ClinicalTrials.gov
        run: |
          python3 scripts/collect_clinicaltrials.py --page-size 4 --max-total 24

      - name: Preserve prior AI reviews
        run: |
          python3 scripts/preserve_ai_reviews.py --previous /tmp/biohealth-radar-data-previous.js --current data.js

      - name: Run OpenAI pre-review
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is not set; skipping OpenAI pre-review."
            exit 0
          fi

          if [ "$APPLY_NEEDS_REVIEW" = "true" ]; then
            python3 scripts/review_with_openai.py --limit "$REVIEW_LIMIT" --apply-needs-review --auto-clear-threshold 0.9
          else
            python3 scripts/review_with_openai.py --limit "$REVIEW_LIMIT"
          fi

      - name: Validate generated files
        run: |
          python3 -m py_compile scripts/collect_pubmed.py scripts/collect_clinicaltrials.py scripts/preserve_ai_reviews.py scripts/review_with_openai.py
          node --check app.js
          node --check data.js

      - name: Commit refreshed data
        id: commit
        run: |
          if git diff --quiet -- data.js data/raw; then
            echo "No data changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js data/raw
          git commit -m "Refresh BioHealth Radar data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Configure Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
